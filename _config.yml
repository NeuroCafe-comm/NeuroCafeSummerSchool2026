# Site settings
course_name: Neuro Cafe Summer School
course_description: "A multidisciplinary summer school organized by the University of Tehran
  Neuroscience Community (Neuro Cafe), bringing together students,
  researchers, and enthusiasts interested in neuroscience, cognitive science,
  neuroimaging, computational neuroscience, neural data analysis,
  neurogenetics, artificial intelligence, and brain-inspired technologies.
"
course_semester: "Summer 2026"

baseurl: "/NeuroCafeSummerSchool2026"
url: "https://neurocafe-comm.github.io" # the base hostname & protocol for your site

schoolname: "University of Tehran"
schoolurl: "https://neurocafe-comm.github.io"
#twitter_username: username 

address: |
    School of Electrical and Computer Engineering
    University of Tehran
    Tehran, Iran

# Set your Google Analytics tracking ID (set up yours at http://www.google.com/analytics/)
# google_analytics: UA-XXXXXXXX-X

### Do not change the followings unless you know what you are doing ###

# Build settings
markdown: kramdown

# Other options
permalink: blog/:year/:month/:title
excerpt_separator: "<!--more-->"

include: ['_images', '_css']
exclude: ['develop']

dateformat: "%m/%d/%Y"

future: true
collections:
    events:
        output: true
    lectures:
        output: true
    assignments:
        output: true
    announcements:
        output: false


defaults:
  - scope:
      path: ""
      type: "assignments"
    values:
      layout: "assignment"
